name: Security Scheduled

on:
  schedule:
    - cron: '30 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scheduled-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security:
    name: Security
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write
