name: Publish Images

on:
  workflow_run:
    workflows:
      - Security
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish GHCR Image
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/nicholasxydis/centre-auto-allard:${{ github.event.workflow_run.head_sha }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Wait for matching CI run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          conclusion=waiting
          for _ in {1..60}; do
            response="$(curl --fail --silent --show-error \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${HEAD_SHA}&event=push&per_page=10")"
            conclusion="$(jq --raw-output --arg sha "${HEAD_SHA}" '
              .workflow_runs
              | map(select(.head_sha == $sha and .event == "push"))
              | first
              | if . == null or .status != "completed" then "waiting" else .conclusion end
            ' <<< "${response}")"
            case "${conclusion}" in
              success)
                break
                ;;
              failure|cancelled|timed_out|action_required|stale|skipped)
                exit 1
                ;;
              *)
                sleep 20
                ;;
            esac
          done
          test "${conclusion}" = "success"

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${HEAD_SHA}" \
            --tag "${IMAGE}" \
            .

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "${GITHUB_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Push image
        run: docker push "${IMAGE}"
