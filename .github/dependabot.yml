version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
      - dependency-name: tailwindcss
        versions:
          - '>=4'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directories:
      - /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
