services:
  centre-auto-allard:
    image: ${CENTRE_AUTO_ALLARD_IMAGE:-ghcr.io/nicholasxydis/centre-auto-allard:latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:8080'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/cache/nginx/client_temp
      - /var/cache/nginx/proxy_temp
      - /var/cache/nginx/fastcgi_temp
      - /var/cache/nginx/uwsgi_temp
      - /var/cache/nginx/scgi_temp
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
